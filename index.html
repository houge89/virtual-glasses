<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虚拟眼镜试戴 | Virtual Glasses Try-On</title>
    <link rel="stylesheet" href="css/style.css?v=202606211410">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="container">
            <div class="logo">👓 虚拟眼镜</div>
            <nav class="nav">
                <a href="index.html" class="active">全部款式</a>
                <a href="tryon.html">AR 试戴</a>
            </nav>
        </div>
    </header>

    <!-- 分类筛选 -->
    <section class="filters">
        <div class="container">
            <div class="filter-btns">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="classic">经典款</button>
                <button class="filter-btn" data-filter="sport">运动款</button>
                <button class="filter-btn" data-filter="retro">复古款</button>
                <button class="filter-btn" data-filter="cat">猫眼款</button>
            </div>
        </div>
    </section>

    <!-- 眼镜列表 -->
    <section class="glasses-grid-section">
        <div class="container">
            <div class="glasses-grid" id="glassesGrid">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 底部 -->
    <footer class="footer">
        <div class="container">
            <p>👓 虚拟眼镜试戴 — 选好款式，点击「试戴」用摄像头试试效果</p>
        </div>
    </footer>

    <script src="js/glasses-data.js?v=202606211410"></script>
    <script src="js/app.js?v=202606211410"></script>
</body>
</html>
